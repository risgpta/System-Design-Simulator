kind = "web"
previewPath = "/"
title = "System Design Simulator"
version = "1.0.0"
id = "artifacts/system-design-sim"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23786

[services.development]
run = "pnpm --filter @workspace/system-design-sim run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/system-design-sim", "run", "build" ]
publicDir = "artifacts/system-design-sim/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23786"
BASE_PATH = "/"
